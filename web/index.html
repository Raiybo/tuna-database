<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tuna - Bluefin Casting Spots, Lebanon</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🐟 Tuna <span>· bluefin casting spots · Lebanese coast</span></h1>
    <div id="status">Loading live sea conditions…</div>
  </header>

  <div id="app">
    <aside id="panel">
      <div class="legend">
        <span><i class="dot prime"></i>Prime</span>
        <span><i class="dot good"></i>Good</span>
        <span><i class="dot fair"></i>Fair</span>
        <span><i class="dot poor"></i>Poor</span>
      </div>
      <button id="refresh">↻ Refresh conditions</button>
      <ol id="ranking"></ol>
      <p class="note">
        Live sea-surface temperature &amp; wave height from
        <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a>.
        Search zones, not guaranteed marks. Bluefin are a regulated species —
        check current seasons, quotas &amp; permits before targeting them.
      </p>
    </aside>
    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
