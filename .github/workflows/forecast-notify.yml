name: Evening forecast notification

# Sends tomorrow's bluefin forecast (verdict + peak bite window) to your phone
# via ntfy.sh, so you know the night before. Set repo secret NTFY_TOPIC (and
# optionally NTFY_SERVER / NTFY_TOKEN). Telegram/Pushover secrets also work.
on:
  schedule:
    - cron: "0 15 * * *"   # 15:00 UTC ~ 18:00 Asia/Beirut (summer); 17:00 winter
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send tomorrow's forecast
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: PYTHONPATH=src python tools/notify.py --day tomorrow
      - name: Save forecast snapshot
        run: |
          git config user.name "tuna-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/forecast.md
          git commit -m "chore: evening forecast snapshot" || echo "No changes to commit"
          git push || echo "push skipped"
